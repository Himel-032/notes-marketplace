<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Notes Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <!-- Sidebar: active page key depends on role -->
    <div th:replace="~{fragments/sidebar :: sidebar(
        ${#authorization.expression('hasRole(''ADMIN'')')} ? 'profile-admin' :
        (${#authorization.expression('hasRole(''SELLER'')')} ? 'seller-profile' : 'buyer-profile')
    )}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header('Edit Profile')}"></div>

        <main class="admin-content container-fluid">

            <!-- Flash messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <section class="card admin-panel mx-auto" style="max-width: 640px;">
                <div class="card-body p-4">
                    <h2 class="h5 mb-4">Profile Information</h2>

                    <form th:action="@{/profile/update}" method="post">
                        <!-- CSRF handled automatically by Spring Security form login -->

                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Full Name</label>
                            <input type="text" id="name" name="name" class="form-control"
                                   th:value="${user.name}" required maxlength="100" />
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" id="email" class="form-control bg-light"
                                   th:value="${user.email}" readonly disabled />
                            <div class="form-text">Email address cannot be changed.</div>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" id="phone" name="phone" class="form-control"
                                   th:value="${user.phone}" maxlength="20"
                                   placeholder="e.g. 01XXXXXXXXX" />
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">New Password</label>
                            <input type="password" id="password" name="password" class="form-control"
                                   placeholder="Leave blank to keep current password"
                                   minlength="6" autocomplete="new-password" />
                            <div class="form-text">Minimum 6 characters. Leave blank to keep your current password.</div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                            <a th:href="${#authorization.expression('hasRole(''ADMIN'')')} ? '/admin/dashboard' :
                                        (${#authorization.expression('hasRole(''SELLER'')')} ? '/seller/dashboard' : '/buyer/dashboard')"
                               class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </section>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
