<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - Notes Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f8fafc; }
        .page-wrap { padding-top: 5.8rem; min-height: calc(100vh - 120px); }
        .card-soft { border: 0; border-radius: 1rem; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
        .redirect-message { font-size: 0.9rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: mainNavbar('buyer-browse')}"></div>

    <main class="page-wrap container d-flex align-items-center justify-content-center pb-4">
        <section class="card card-soft text-center p-4 p-md-5" style="max-width: 640px;">
            <div class="display-6 text-warning mb-2">Payment Cancelled</div>
            <h1 class="h3 text-warning mb-3">Payment Cancelled</h1>
            <p class="text-secondary mb-4">Your payment attempt was cancelled. No amount was charged.</p>
            <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
                <a href="/buyer/browse" class="btn btn-warning">Browse Notes</a>
                <a href="/buyer/dashboard" class="btn btn-primary">Go to Dashboard</a>
            </div>
            <p class="redirect-message text-secondary mt-3 mb-0">Redirecting to browse page in <span id="countdown">6</span> seconds...</p>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: mainFooter}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let countdown = 6;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = '/buyer/browse';
            }
        }, 1000);
    </script>
</body>
</html>
