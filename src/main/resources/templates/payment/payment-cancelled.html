<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - Notes Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cancelled-container {
            background: white;
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
        }
        .cancelled-icon {
            font-size: 100px;
            margin-bottom: 20px;
        }
        h1 {
            color: #f39c12;
            font-size: 36px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .redirect-message {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-warning {
            background: #f39c12;
            color: white;
        }
    </style>
</head>
<body>
    <div class="cancelled-container">
        <div class="cancelled-icon">⚠️</div>
        <h1>Payment Cancelled</h1>
        <p>
            You have cancelled the payment process.<br>
            No charges have been made to your account.
        </p>
        
        <div class="btn-container">
            <a href="/buyer/browse" class="btn btn-warning">Browse Notes</a>
            <a href="/buyer/dashboard" class="btn btn-primary">Go to Dashboard</a>
        </div>
        
        <p class="redirect-message">
            Redirecting to browse page in <span id="countdown">6</span> seconds...
        </p>
    </div>

    <script>
        let countdown = 6;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = '/buyer/browse';
            }
        }, 1000);
    </script>
</body>
</html>
