<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Notes Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #dbeafe 0%, #f8fafc 55%);
        }
        .auth-wrap {
            min-height: calc(100vh - 180px);
            padding-top: 6rem;
        }
        .auth-card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: mainNavbar('login')}"></div>

    <main class="auth-wrap d-flex align-items-center">
        <div class="container">
            <div th:replace="~{fragments/header :: flashMessages}"></div>
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-5">
                    <div class="card auth-card p-3 p-md-4">
                        <div class="card-body">
                            <h1 class="h3 text-center mb-4 fw-semibold">Welcome Back</h1>
                            <form th:action="@{/login}" method="post" class="vstack gap-3">
                                <div>
                                    <label for="username" class="form-label">Email</label>
                                    <input type="email" id="username" name="username" class="form-control form-control-lg" required placeholder="you@example.com">
                                </div>
                                <div>
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" id="password" name="password" class="form-control form-control-lg" required placeholder="Enter your password">
                                </div>
                                <button type="submit" class="btn btn-primary btn-lg">Login</button>
                            </form>
                            <p class="text-center mt-4 mb-0 text-secondary">
                                Don't have an account?
                                <a th:href="@{/register}" class="text-decoration-none fw-semibold">Create one</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: mainFooter}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
