<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Notes Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #dbeafe 0%, #f8fafc 55%);
        }
        .auth-wrap {
            min-height: calc(100vh - 180px);
            padding-top: 6rem;
        }
        .auth-card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: mainNavbar('register')}"></div>

    <main class="auth-wrap d-flex align-items-center">
        <div class="container">
            <div th:replace="~{fragments/header :: flashMessages}"></div>
            <div class="row justify-content-center">
                <div class="col-12 col-md-9 col-lg-6">
                    <div class="card auth-card p-3 p-md-4">
                        <div class="card-body">
                            <h1 class="h3 text-center mb-4 fw-semibold">Create Account</h1>

                            <form th:action="@{/register}" method="post" class="vstack gap-3">
                                <div>
                                    <label for="name" class="form-label">Full Name</label>
                                    <input type="text" id="name" name="name" class="form-control form-control-lg" required placeholder="Your full name">
                                </div>

                                <div>
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" id="email" name="email" class="form-control form-control-lg" required placeholder="you@example.com">
                                </div>

                                <div>
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" id="password" name="password" class="form-control form-control-lg" required placeholder="Minimum 6 characters" minlength="6">
                                </div>

                                <div>
                                    <label for="role" class="form-label">Register As</label>
                                    <select id="role" name="role" class="form-select form-select-lg" required>
                                        <option value="">Select your role</option>
                                        <option value="BUYER">Buyer - Purchase Notes</option>
                                        <option value="SELLER">Seller - Sell Your Notes</option>
                                    </select>
                                </div>

                                <button type="submit" class="btn btn-primary btn-lg">Register</button>
                            </form>

                            <p class="text-center mt-4 mb-0 text-secondary">
                                Already have an account?
                                <a th:href="@{/login}" class="text-decoration-none fw-semibold">Login</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: mainFooter}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
