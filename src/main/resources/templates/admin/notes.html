<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header(${pageTitle})}"></div>

        <main class="admin-content container-fluid">
            <section class="card admin-panel">
                <div class="card-body">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                        <h4 class="panel-title mb-0">Notes Management</h4>
                    </div>

                    <div th:if="${param.deleted}" class="alert alert-success">Note deleted successfully.</div>

                    <form class="row g-2 mb-3" method="get" th:action="@{/admin/notes}">
                        <div class="col-12 col-lg-8">
                            <input class="form-control" type="text" name="q" placeholder="Search by title, category, seller" th:value="${q}">
                        </div>
                        <div class="col-12 col-lg-4 d-flex gap-2">
                            <button class="btn btn-primary" type="submit">Search</button>
                            <a class="btn btn-outline-secondary" th:href="@{/admin/notes}">Reset</a>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table class="table align-middle admin-table">
                            <thead>
                            <tr>
                                <th>Title</th>
                                <th>Seller</th>
                                <th>Price</th>
                                <th>Upload Date</th>
                                <th class="text-end">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(notes)}">
                                <td colspan="5" class="text-center text-muted py-4">No notes found.</td>
                            </tr>
                            <tr th:each="note : ${notes}">
                                <td>
                                    <p class="mb-0 fw-semibold" th:text="${note.title}">Title</p>
                                    <small class="text-muted" th:text="${note.category != null ? note.category : 'General'}">Category</small>
                                </td>
                                <td th:text="${note.sellerEmail != null ? note.sellerEmail : 'Unknown'}">Seller</td>
                                <td>$<span th:text="${#numbers.formatDecimal(note.price, 1, 2)}">0.00</span></td>
                                <td>N/A</td>
                                <td>
                                    <div class="d-flex gap-2 justify-content-end">
                                        <a class="btn btn-sm btn-outline-primary" th:href="${note.pdfUrl}" target="_blank" rel="noopener noreferrer">View PDF</a>
                                        <form method="post" th:action="@{/admin/notes/{id}/delete(id=${note.id})}"
                                              data-confirm="Delete this note permanently?">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
