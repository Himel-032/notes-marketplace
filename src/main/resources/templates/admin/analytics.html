<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header(${pageTitle})}"></div>

        <main class="admin-content container-fluid">
            <section class="row g-3 mb-4">
                <div class="col-12 col-sm-6 col-xl-3">
                    <article class="stat-card compact">
                        <h3>Total Users</h3>
                        <p th:text="${totalUsers}">0</p>
                    </article>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <article class="stat-card compact">
                        <h3>Total Notes</h3>
                        <p th:text="${totalNotes}">0</p>
                    </article>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <article class="stat-card compact">
                        <h3>Total Orders</h3>
                        <p th:text="${totalOrders}">0</p>
                    </article>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <article class="stat-card compact">
                        <h3>Total Revenue</h3>
                        <p>$<span th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)}">0.00</span></p>
                    </article>
                </div>
            </section>

            <div class="row g-3">
                <div class="col-12 col-xl-8">
                    <section class="card admin-panel h-100">
                        <div class="card-body">
                            <h4 class="panel-title">Sales Over Time (Last 7 Days)</h4>
                            <div class="chart-wrap chart-large">
                                <canvas id="salesChart"></canvas>
                            </div>
                        </div>
                    </section>
                </div>
                <div class="col-12 col-xl-4">
                    <section class="card admin-panel h-100">
                        <div class="card-body">
                            <h4 class="panel-title">Top Selling Notes</h4>
                            <div class="chart-wrap chart-small">
                                <canvas id="topNotesChart"></canvas>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
<script th:inline="javascript">
    const salesLabels = /*[[${salesLabels}]]*/ [];
    const salesData = /*[[${salesData}]]*/ [];
    const topNoteLabels = /*[[${topNoteLabels}]]*/ [];
    const topNoteData = /*[[${topNoteData}]]*/ [];

    const salesCtx = document.getElementById('salesChart');
    if (salesCtx) {
        new Chart(salesCtx, {
            type: 'line',
            data: {
                labels: salesLabels,
                datasets: [{
                    label: 'Sales',
                    data: salesData,
                    borderColor: '#1f8a70',
                    backgroundColor: 'rgba(31, 138, 112, 0.18)',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    const topNotesCtx = document.getElementById('topNotesChart');
    if (topNotesCtx) {
        new Chart(topNotesCtx, {
            type: 'bar',
            data: {
                labels: topNoteLabels,
                datasets: [{
                    label: 'Purchases',
                    data: topNoteData,
                    backgroundColor: ['#1f8a70', '#2e9f84', '#f2a541', '#d95d39', '#3b82f6']
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
