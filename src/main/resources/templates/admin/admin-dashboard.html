<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="container py-5">
    <div class="card admin-panel mx-auto" style="max-width: 720px;">
        <div class="card-body p-4 p-md-5 text-center">
            <h1 class="h3 mb-1">Admin Access</h1>
            <p class="text-secondary mb-3">Signed in as <strong sec:authentication="name">admin@example.com</strong></p>
            <span class="badge text-bg-dark mb-4">ADMIN</span>

            <ul class="list-group text-start mb-4">
                <li class="list-group-item">Manage users and roles</li>
                <li class="list-group-item">Review notes and moderation queue</li>
                <li class="list-group-item">Inspect order history and analytics</li>
            </ul>

            <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
                <a class="btn btn-primary" th:href="@{/admin/dashboard}">Open Admin Panel</a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger">Logout</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
