<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header(${pageTitle})}"></div>

        <main class="admin-content container-fluid">
            <div class="row g-3 mb-4">
                <div class="col-12 col-md-6 col-xl-3">
                    <article class="stat-card compact">
                        <h3>Total Users</h3>
                        <p th:text="${#lists.size(users)}">0</p>
                    </article>
                </div>
                <div class="col-12 col-md-6 col-xl-3">
                    <article class="stat-card compact">
                        <h3>Active</h3>
                        <p th:text="${activeUsers}">0</p>
                    </article>
                </div>
                <div class="col-12 col-md-6 col-xl-3">
                    <article class="stat-card compact">
                        <h3>Disabled</h3>
                        <p th:text="${disabledUsers}">0</p>
                    </article>
                </div>
            </div>

            <section class="card admin-panel">
                <div class="card-body">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                        <h4 class="panel-title mb-0">User Management</h4>
                    </div>

                    <div th:if="${param.updated}" class="alert alert-success">User status updated successfully.</div>
                    <div th:if="${param.deleted}" class="alert alert-success">User deleted successfully.</div>

                    <form class="row g-2 mb-3" method="get" th:action="@{/admin/users}">
                        <div class="col-12 col-lg-6">
                            <input class="form-control" type="text" name="q" placeholder="Search by name or email" th:value="${q}">
                        </div>
                        <div class="col-6 col-lg-3">
                            <select class="form-select" name="role">
                                <option value="" th:selected="${role == null || role.isEmpty()}">All Roles</option>
                                <option value="ADMIN" th:selected="${role == 'ADMIN'}">ADMIN</option>
                                <option value="SELLER" th:selected="${role == 'SELLER'}">SELLER</option>
                                <option value="BUYER" th:selected="${role == 'BUYER'}">BUYER</option>
                            </select>
                        </div>
                        <div class="col-6 col-lg-3">
                            <select class="form-select" name="status">
                                <option value="" th:selected="${status == null || status.isEmpty()}">All Status</option>
                                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">ACTIVE</option>
                                <option value="DISABLED" th:selected="${status == 'DISABLED'}">DISABLED</option>
                            </select>
                        </div>
                        <div class="col-12 d-flex gap-2">
                            <button class="btn btn-primary" type="submit">Search</button>
                            <a class="btn btn-outline-secondary" th:href="@{/admin/users}">Reset</a>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table class="table align-middle admin-table">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th class="text-end">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="6" class="text-center text-muted py-4">No users found.</td>
                            </tr>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">1</td>
                                <td th:text="${user.name}">John</td>
                                <td th:text="${user.email}">john@mail.com</td>
                                <td>
                                    <span th:each="roleItem : ${user.roles}"
                                          class="badge me-1"
                                        th:classappend="${roleItem == 'ADMIN'} ? 'text-bg-dark' : (${roleItem == 'SELLER'} ? 'text-bg-primary' : 'text-bg-info')"
                                        th:text="${roleItem}">BUYER</span>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${user.enabled} ? 'text-bg-success' : 'text-bg-danger'"
                                          th:text="${user.enabled} ? 'ACTIVE' : 'DISABLED'">ACTIVE</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-2 justify-content-end">
                                        <form method="post" th:action="@{/admin/users/{id}/toggle(id=${user.id})}">
                                            <button type="submit" class="btn btn-sm"
                                                    th:classappend="${user.enabled} ? 'btn-outline-warning' : 'btn-outline-success'"
                                                    th:text="${user.enabled} ? 'Disable' : 'Enable'">Disable</button>
                                        </form>
                                        <form method="post" th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                              data-confirm="Delete this user permanently?">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
