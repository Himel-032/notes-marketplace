<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header(${pageTitle})}"></div>

        <main class="admin-content container-fluid">
            <section class="card admin-panel">
                <div class="card-body">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                        <h4 class="panel-title mb-0">Orders Management</h4>
                    </div>

                    <form class="row g-2 mb-3" method="get" th:action="@{/admin/orders}">
                        <div class="col-12 col-md-4 col-lg-3">
                            <select class="form-select" name="status">
                                <option value="" th:selected="${status == null || status.isEmpty()}">All Status</option>
                                <option value="PAID" th:selected="${status == 'PAID'}">PAID</option>
                                <option value="PENDING" th:selected="${status == 'PENDING'}">PENDING</option>
                                <option value="FAILED" th:selected="${status == 'FAILED'}">FAILED</option>
                                <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">CANCELLED</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-8 col-lg-5 d-flex gap-2">
                            <button class="btn btn-primary" type="submit">Apply Filter</button>
                            <a class="btn btn-outline-secondary" th:href="@{/admin/orders}">Reset</a>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table class="table align-middle admin-table">
                            <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Buyer</th>
                                <th>Total Price</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="5" class="text-center text-muted py-4">No orders found.</td>
                            </tr>
                            <tr th:each="order : ${orders}">
                                <td th:text="${order.id}">1</td>
                                <td th:text="${order.buyer != null ? order.buyer.name : 'N/A'}">Buyer</td>
                                <td>৳ <span th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}">0.00</span></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${order.status == 'PAID'} ? 'text-bg-success' : (${order.status == 'PENDING'} ? 'text-bg-warning' : (${order.status == 'FAILED'} ? 'text-bg-danger' : 'text-bg-secondary'))"
                                          th:text="${order.status != null ? order.status : 'UNKNOWN'}">PAID</span>
                                </td>
                                <td th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'dd MMM yyyy HH:mm') : 'N/A'}">Date</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <nav aria-label="Orders pagination" class="pt-2">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item disabled"><span class="page-link">Previous</span></li>
                            <li class="page-item active"><span class="page-link">1</span></li>
                            <li class="page-item disabled"><span class="page-link">Next</span></li>
                        </ul>
                    </nav>
                </div>
            </section>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
