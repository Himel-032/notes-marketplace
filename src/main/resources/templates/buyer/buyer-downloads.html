<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes - Notes Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .note-item { border: 1px solid #e2e8f0; border-radius: 0.85rem; }
        .note-item:hover { box-shadow: 0 10px 20px rgba(15,23,42,0.09); }
        .note-thumb { width: 100%; height: 180px; object-fit: cover; border-radius: 0.75rem; background: #f1f5f9; }
    </style>
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar('buyer-downloads')}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header('My Downloads')}"></div>

    <main class="admin-content container-fluid">
        <section class="card admin-panel mb-3">
            <div class="card-body">
                <h1 class="h4 mb-1">My Downloads</h1>
                <p class="text-secondary mb-0">All purchased notes are available here for preview and download.</p>
            </div>
        </section>

        <div id="loading" class="alert alert-info">Loading your purchased notes...</div>
        
        <section id="downloadsContainer" class="row g-3" style="display: none;"></section>
        
        <section id="noDownloads" class="card admin-panel" style="display: none;">
            <div class="card-body text-center py-5">
                <h2 class="h5">No notes available</h2>
                <p class="text-secondary">You haven't purchased any notes yet.</p>
                <a href="/buyer/browse" class="btn btn-primary">Browse Notes</a>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', loadDownloads);

        async function loadDownloads() {
            document.getElementById('loading').style.display = 'block';
            
            try {
                const response = await fetch('/api/buyer/my-downloads');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch downloads: ' + response.status);
                }
                
                const notes = await response.json();
                console.log('Downloaded notes loaded:', notes.length, notes);

                document.getElementById('loading').style.display = 'none';

                if (notes.length === 0) {
                    document.getElementById('noDownloads').style.display = 'block';
                } else {
                    displayDownloads(notes);
                }
            } catch (error) {
                console.error('Error loading downloads:', error);
                document.getElementById('loading').textContent = 'Error loading downloads: ' + error.message;
                document.getElementById('loading').style.color = '#e74c3c';
            }
        }

        function displayDownloads(notes) {
            const container = document.getElementById('downloadsContainer');
            container.innerHTML = '';
            container.style.display = 'flex';

            notes.forEach(note => {
                const item = document.createElement('div');
                item.className = 'col-12';
                item.innerHTML = `
                    <article class="card admin-panel note-item">
                        <div class="card-body">
                            <div class="row g-3 align-items-center">
                                <div class="col-12 col-md-3">
                                    ${note.previewImageUrl ? 
                                        `<img class="note-thumb" src="${note.previewImageUrl}" alt="${note.title}">` : 
                                        '<div class="note-thumb d-flex align-items-center justify-content-center">PDF</div>'}
                                </div>
                                <div class="col-12 col-md-6">
                                    <h2 class="h5 mb-1">${note.title}</h2>
                                    <span class="badge text-bg-primary mb-2">${note.category || 'Uncategorized'}</span>
                                    <p class="text-secondary mb-2">${note.description || 'No description'}</p>
                                    <p class="mb-0 fw-semibold text-success">৳ ${note.price}</p>
                                </div>
                                <div class="col-12 col-md-3 d-grid gap-2">
                                    <button class="btn btn-outline-primary" onclick="viewPdf(${note.id})">View PDF</button>
                                    <button class="btn btn-success" onclick="downloadPdf(${note.id}, '${note.title}')">Download</button>
                                </div>
                            </div>
                        </div>
                    </article>
                `;
                container.appendChild(item);
            });
        }

        async function viewPdf(noteId) {
            try {
                window.open(`/api/buyer/notes/${noteId}/full-preview`, '_blank');
            } catch (error) {
                console.error('Error viewing PDF:', error);
                alert('Error viewing PDF. Please try again.');
            }
        }

        async function downloadPdf(noteId, title) {
            try {
                window.location.href = `/api/buyer/notes/${noteId}/download`;
            } catch (error) {
                console.error('Error downloading PDF:', error);
                alert('Error downloading PDF. Please try again.');
            }
        }
    </script>
</body>
</html>
