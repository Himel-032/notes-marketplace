<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Notes Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .status-badge { border-radius: 999px; padding: 0.35rem 0.75rem; font-size: 0.75rem; font-weight: 600; }
        .status-paid { background: #dcfce7; color: #166534; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-failed { background: #fee2e2; color: #991b1b; }
        .transaction-id { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar('buyer-orders')}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header('Order History')}"></div>

    <main class="admin-content container-fluid">
        <section class="card admin-panel mb-3">
            <div class="card-body">
                <h1 class="h4 mb-1">Order History</h1>
                <p class="text-secondary mb-0">Track all your purchases and payment statuses.</p>
            </div>
        </section>

        <section class="row g-3 mb-3">
            <div class="col-12 col-md-6">
                <div class="card admin-panel">
                    <div class="card-body text-center">
                        <p class="text-secondary mb-1">Total Orders</p>
                        <p class="display-6 mb-0" id="totalOrders">0</p>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="card admin-panel">
                    <div class="card-body text-center">
                        <p class="text-secondary mb-1">Total Amount</p>
                        <p class="display-6 text-success mb-0" id="totalAmount">৳ 0</p>
                    </div>
                </div>
            </div>
        </section>

        <div id="loading" class="alert alert-info">Loading orders...</div>
        
        <section id="ordersContainer" class="card admin-panel" style="display: none;">
            <div class="card-body table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Transaction ID</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Items</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody"></tbody>
                </table>
            </div>
        </section>
        
        <section id="noOrders" class="card admin-panel" style="display: none;">
            <div class="card-body text-center py-5">
                <h2 class="h5">No orders yet</h2>
                <p class="text-secondary">You haven't placed any order. Start by browsing available notes.</p>
                <a href="/buyer/browse" class="btn btn-primary">Browse Notes</a>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', loadOrders);

        async function loadOrders() {
            document.getElementById('loading').style.display = 'block';
            
            try {
                const response = await fetch('/api/buyer/my-orders');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch orders: ' + response.status);
                }
                
                const orders = await response.json();
                console.log('Orders loaded:', orders.length, orders);

                document.getElementById('loading').style.display = 'none';

                if (orders.length === 0) {
                    document.getElementById('noOrders').style.display = 'block';
                } else {
                    displayOrders(orders);
                    updateSummary(orders);
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('loading').textContent = 'Error loading orders: ' + error.message;
                document.getElementById('loading').style.color = '#e74c3c';
            }
        }

        function displayOrders(orders) {
            const container = document.getElementById('ordersContainer');
            const tbody = document.getElementById('ordersBody');
            tbody.innerHTML = '';
            container.style.display = 'block';

            orders.forEach(order => {
                const row = document.createElement('tr');
                
                const date = new Date(order.createdAt);
                const formattedDate = date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
                
                let statusClass = 'status-paid';
                if (order.status === 'PENDING') statusClass = 'status-pending';
                if (order.status === 'FAILED') statusClass = 'status-failed';
                
                row.innerHTML = `
                    <td><strong>#${order.id}</strong></td>
                    <td><span class="transaction-id">${order.transactionId || 'N/A'}</span></td>
                    <td>${formattedDate}</td>
                    <td><strong>৳ ${order.totalPrice}</strong></td>
                    <td><span class="status-badge ${statusClass}">${order.status}</span></td>
                    <td>1 item</td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateSummary(orders) {
            const totalOrders = orders.length;
            const totalAmount = orders.reduce((sum, order) => sum + order.totalPrice, 0);

            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalAmount').textContent = '৳' + totalAmount.toFixed(2);
        }
    </script>
</body>
</html>
