<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Notes - Notes Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .note-card { transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .note-card:hover { transform: translateY(-5px); box-shadow: 0 16px 28px rgba(15, 23, 42, 0.14); }
        .note-preview { height: 180px; object-fit: cover; width: 100%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; z-index: 1100; inset: 0; background: rgba(15,23,42,0.6); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { width: min(720px, 95vw); border-radius: 1rem; }
    </style>
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar('buyer-browse')}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header('Browse Notes')}"></div>

        <main class="admin-content container-fluid">
            <section class="card admin-panel mb-3">
                <div class="card-body">
                    <h1 class="h4 mb-3">Browse Notes</h1>
                    <div class="row g-2">
                        <div class="col-12 col-lg-5">
                            <input type="text" id="searchInput" class="form-control" placeholder="Search by title or description...">
                        </div>
                        <div class="col-12 col-lg-3">
                            <select id="categoryFilter" class="form-select">
                                <option value="">All Categories</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Mathematics">Mathematics</option>
                                <option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option>
                                <option value="Biology">Biology</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Business">Business</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-6 col-lg-2 d-grid">
                            <button class="btn btn-primary" onclick="loadNotes()">Search</button>
                        </div>
                        <div class="col-6 col-lg-2 d-grid">
                            <button class="btn btn-outline-secondary" onclick="clearFilters()">Clear</button>
                        </div>
                    </div>
                </div>
            </section>

            <div id="loading" class="alert alert-info">Loading notes...</div>
            <section id="notesContainer" class="row g-3" style="display: none;"></section>
            <section id="noResults" class="card admin-panel" style="display: none;">
                <div class="card-body text-center py-5">
                    <h2 class="h5">No notes available</h2>
                    <p class="text-secondary mb-0">Try adjusting your search or category filter.</p>
                </div>
            </section>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<div id="previewModal" class="modal">
    <div class="modal-content card p-3 p-md-4">
        <div class="d-flex justify-content-between align-items-center">
            <h2 class="h5 mb-0" id="modalTitle">Note Title</h2>
            <button type="button" class="btn-close" aria-label="Close" onclick="closeModal()"></button>
        </div>
        <span id="modalCategory" class="badge text-bg-primary mt-2"></span>
        <img id="modalPreview" class="img-fluid rounded mt-3" src="" alt="Preview">
        <p id="modalDescription" class="text-secondary mt-3 mb-2"></p>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <div id="modalPrice" class="h5 text-success mb-0"></div>
            <button id="modalBuyBtn" class="btn btn-primary" onclick="buyNote()">Buy Now</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
<script>
    let currentNoteId = null;
    let purchasedNotes = new Set();

    document.addEventListener('DOMContentLoaded', async () => {
        await loadPurchasedNotes();
        await loadNotes();
    });

    async function loadPurchasedNotes() {
        try {
            const response = await fetch('/api/buyer/my-downloads');
            if (!response.ok) {
                console.error('Failed to fetch purchased notes:', response.status);
                return;
            }
            const notes = await response.json();
            purchasedNotes = new Set(notes.map(note => note.id));
        } catch (error) {
            console.error('Error loading purchased notes:', error);
        }
    }

    async function loadNotes() {
        const searchKeyword = document.getElementById('searchInput').value.trim();
        const category = document.getElementById('categoryFilter').value;

        let url = '/api/buyer/notes';
        if (searchKeyword) {
            url = `/api/buyer/notes/search?keyword=${encodeURIComponent(searchKeyword)}`;
        } else if (category) {
            url = `/api/buyer/notes/filter?category=${encodeURIComponent(category)}`;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('notesContainer').style.display = 'none';
        document.getElementById('noResults').style.display = 'none';

        try {
            const response = await fetch(url);
            const notes = await response.json();
            document.getElementById('loading').style.display = 'none';

            if (notes.length === 0) {
                document.getElementById('noResults').style.display = 'block';
            } else {
                displayNotes(notes);
            }
        } catch (error) {
            console.error('Error loading notes:', error);
            document.getElementById('loading').textContent = 'Error loading notes. Please try again.';
        }
    }

    function displayNotes(notes) {
        const container = document.getElementById('notesContainer');
        container.innerHTML = '';
        container.style.display = 'flex';

        notes.forEach(note => {
            const isPurchased = purchasedNotes.has(note.id);

            const salesInfo = (note.salesCount && note.salesCount > 0)
                    ? `<span class="text-muted small">Bought ${note.salesCount} times</span>`
                    : `<span class="text-muted small">Not sold yet</span>`;

            const card = document.createElement('div');
            card.className = 'col-12 col-md-6 col-xl-4';
            card.innerHTML = `
                <article class="card admin-panel note-card h-100">
                    <div class="note-preview rounded-top">
                        ${note.previewImageUrl ?
                            `<img class="w-100 h-100" src="${note.previewImageUrl}" alt="${note.title}" style="object-fit:cover;">` :
                            'PDF'}
                    </div>
                    <div class="card-body d-flex flex-column">
                        <span class="badge text-bg-primary align-self-start mb-2">${note.category || 'Uncategorized'}</span>
                        <h2 class="h5 mb-2">${note.title}</h2>
                        <p class="text-secondary small mb-1">${note.description || 'No description'}</p>
                        <div class="mb-3">${salesInfo}</div>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="h5 text-success mb-0">৳ ${note.price}</span>
                            ${isPurchased ?
                                '<span class="badge text-bg-success">Purchased</span>' :
                                `<button class="btn btn-primary btn-sm" onclick="showPreview(${note.id})">Preview & Buy</button>`
                            }
                        </div>
                    </div>
                </article>
            `;
            container.appendChild(card);
        });
    }

    async function showPreview(noteId) {
        if (purchasedNotes.has(noteId)) {
            alert('You have already purchased this note. Check My Downloads page.');
            return;
        }

        currentNoteId = noteId;
        try {
            const response = await fetch(`/api/buyer/notes/${noteId}/preview`);
            const data = await response.json();

            document.getElementById('modalTitle').textContent = data.title;
            document.getElementById('modalCategory').textContent = data.category || 'Uncategorized';
            document.getElementById('modalDescription').textContent = data.description || 'No description';
            document.getElementById('modalPrice').textContent = `৳ ${data.price}`;
            document.getElementById('modalPreview').src = data.previewImageUrl || '';

            document.getElementById('previewModal').classList.add('active');
        } catch (error) {
            console.error('Error loading preview:', error);
            alert('Error loading preview');
        }
    }

    function closeModal() {
        document.getElementById('previewModal').classList.remove('active');
        currentNoteId = null;
    }

    async function buyNote() {
        if (!currentNoteId) return;

        if (purchasedNotes.has(currentNoteId)) {
            alert('You have already purchased this note!');
            closeModal();
            return;
        }

        const buyBtn = document.getElementById('modalBuyBtn');
        buyBtn.disabled = true;
        buyBtn.textContent = 'Processing...';

        try {
            const response = await fetch('/api/payment/pay', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ noteId: currentNoteId })
            });

            const gatewayUrl = await response.text();
            window.location.href = gatewayUrl;
        } catch (error) {
            console.error('Error initiating payment:', error);
            alert('Error initiating payment. Please try again.');
            buyBtn.disabled = false;
            buyBtn.textContent = 'Buy Now';
        }
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('categoryFilter').value = '';
        loadNotes();
    }

    window.onclick = function(event) {
        const modal = document.getElementById('previewModal');
        if (event.target === modal) {
            closeModal();
        }
    };

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            loadNotes();
        }
    });

    document.addEventListener('visibilitychange', async () => {
        if (!document.hidden) {
            await loadPurchasedNotes();
            await loadNotes();
        }
    });
</script>
</body>
</html>
