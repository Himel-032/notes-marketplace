<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard - Notes Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar('buyer-dashboard')}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header('Buyer Dashboard')}"></div>

        <main class="admin-content container-fluid">
            <section class="card admin-panel mb-4">
                <div class="card-body d-flex flex-column flex-lg-row justify-content-between gap-2">
                    <div>
                        <h1 class="h4 mb-1">Find quality study notes in one place</h1>
                        <p class="text-secondary mb-0">Signed in as <strong th:text="${currentUserName}">Buyer Name</strong></p>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="/buyer/browse" class="btn btn-primary">Browse Notes</a>
                        <a href="/buyer/my-downloads" class="btn btn-outline-primary">My Downloads</a>
                    </div>
                </div>
            </section>

            <section class="row g-3 mb-4">
                <div class="col-12 col-sm-6 col-xl-4">
                    <article class="stat-card compact">
                        <h3>Total Purchases</h3>
                        <p id="totalPurchases">0</p>
                    </article>
                </div>
                <div class="col-12 col-sm-6 col-xl-4">
                    <article class="stat-card compact">
                        <h3>Total Spent</h3>
                        <p id="totalSpent">৳ 0</p>
                    </article>
                </div>
                <div class="col-12 col-sm-6 col-xl-4">
                    <article class="stat-card compact">
                        <h3>Notes Available</h3>
                        <p id="notesAvailable">0</p>
                    </article>
                </div>
            </section>

            <section class="card admin-panel mb-4">
                <div class="card-body">
                    <h4 class="panel-title">Quick Actions</h4>
                    <div class="quick-actions">
                        <a href="/buyer/browse" class="btn btn-primary">Browse Notes</a>
                        <a href="/buyer/orders" class="btn btn-outline-primary">Order History</a>
                        <a href="/buyer/my-downloads" class="btn btn-outline-primary">My Downloads</a>
                    </div>
                </div>
            </section>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

    <script>
        fetch('/api/buyer/stats')
            .then(response => response.json())
            .then(data => {
                const spent = Number(data.totalSpent || 0);
                document.getElementById('totalPurchases').textContent = data.totalPurchases || 0;
                document.getElementById('totalSpent').textContent = '৳ ' + spent.toFixed(2);
                document.getElementById('notesAvailable').textContent = data.notesAvailable || 0;
            })
            .catch(error => console.error('Error loading stats:', error));
    </script>
</body>
</html>
