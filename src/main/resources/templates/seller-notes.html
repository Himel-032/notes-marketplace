<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes - Seller Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: white;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left h1 {
            color: #667eea;
            font-size: 28px;
        }
        .nav-links {
            display: flex;
            gap: 15px;
        }
        .nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }
        .nav-btn:hover {
            background: #5568d3;
        }
        .nav-btn.add-new {
            background: #27ae60;
        }
        .nav-btn.add-new:hover {
            background: #229954;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .notes-header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .notes-header h2 {
            color: #667eea;
            font-size: 24px;
        }
        .notes-count {
            color: #764ba2;
            font-size: 18px;
            font-weight: 600;
        }
        .loading {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: #667eea;
            font-size: 18px;
        }
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .note-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: transform 0.3s;
        }
        .note-card:hover {
            transform: translateY(-5px);
        }
        .note-card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
        }
        .note-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .note-category {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
        .note-card-body {
            padding: 20px;
        }
        .note-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
            max-height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .note-price {
            color: #27ae60;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .note-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            text-align: center;
            min-width: 100px;
        }
        .preview-btn {
            background: #3498db;
            color: white;
        }
        .preview-btn:hover {
            opacity: 0.8;
        }
        .download-btn {
            background: #27ae60;
            color: white;
        }
        .download-btn:hover {
            opacity: 0.8;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        .delete-btn:hover {
            opacity: 0.8;
        }
        .edit-btn {
            background: #f39c12;
            color: white;
        }
        .edit-btn:hover {
            opacity: 0.8;
        }
        .no-notes {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .no-notes-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .no-notes h3 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .no-notes p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        /* PDF Preview Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            width: 90%;
            height: 90%;
            border-radius: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .open-new-tab-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        .open-new-tab-btn:hover {
            opacity: 0.8;
        }
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-modal:hover {
            opacity: 0.8;
        }
        .modal-body {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #525659;
        }
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        .pdf-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            display: none;
        }
        .pdf-loading.active {
            display: block;
        }
        
        /* Edit Modal */
        .edit-modal-content {
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 10px;
            position: relative;
        }
        .edit-form {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .submit-btn {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:hover {
            background: #5568d3;
        }
        .cancel-btn {
            background: #95a5a6;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .cancel-btn:hover {
            background: #7f8c8d;
        }
        
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        @media (max-width: 768px) {
            .notes-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>📚 My Notes</h1>
        </div>
        <div class="nav-links">
            <a href="/seller/dashboard" class="nav-btn">Dashboard</a>
            <a href="/seller/upload-note" class="nav-btn add-new">+ Add New Note</a>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="notes-header">
            <h2>Uploaded Notes</h2>
            <div class="notes-count" id="notesCount">Loading...</div>
        </div>
        
        <div id="messageContainer"></div>
        <div class="loading" id="loading">Loading your notes...</div>
        <div id="notesContainer" class="notes-grid"></div>
    </div>

    <!-- PDF Preview Modal -->
    <div id="pdfModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">PDF Preview</div>
                <div class="modal-actions">
                    <button class="open-new-tab-btn" onclick="openInNewTab()">Open in New Tab</button>
                    <button class="close-modal" onclick="closePreview()">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <div class="pdf-loading" id="pdfLoading">Loading PDF...</div>
                <iframe id="pdfViewer" class="pdf-viewer" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <!-- Edit Note Modal -->
    <div id="editModal" class="modal">
        <div class="edit-modal-content">
            <div class="modal-header">
                <div class="modal-title">Edit Note</div>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <form class="edit-form" id="editForm" onsubmit="updateNote(event)">
                <input type="hidden" id="editNoteId">
                
                <div class="form-group">
                    <label for="editTitle">Title *</label>
                    <input type="text" id="editTitle" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="editDescription">Description *</label>
                    <textarea id="editDescription" class="form-control" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="editCategory">Category *</label>
                    <input type="text" id="editCategory" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="editPrice">Price (৳) *</label>
                    <input type="number" id="editPrice" class="form-control" min="0" step="0.01" required>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="submit-btn">Update Note</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allNotes = [];
        let currentPdfUrl = '';

        // Load notes on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadNotes();
        });

        // Load notes function
        async function loadNotes() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('notesContainer');
            const countDiv = document.getElementById('notesCount');
            
            loading.style.display = 'block';
            container.innerHTML = '';
            
            try {
                const response = await fetch('/seller/notes/my-notes');
                
                if (response.ok) {
                    allNotes = await response.json();
                    countDiv.textContent = `Total: ${allNotes.length} note${allNotes.length !== 1 ? 's' : ''}`;
                    
                    if (allNotes.length === 0) {
                        container.innerHTML = `
                            <div class="no-notes">
                                <div class="no-notes-icon">📭</div>
                                <h3>No Notes Uploaded Yet</h3>
                                <p>Start sharing your knowledge by uploading your first note!</p>
                                <a href="/seller/upload-note" class="nav-btn add-new">+ Upload Your First Note</a>
                            </div>
                        `;
                    } else {
                        allNotes.forEach(note => {
                            container.appendChild(createNoteCard(note));
                        });
                    }
                } else {
                    showMessage('Error loading notes', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                loading.style.display = 'none';
            }
        }

        // Create note card element
        function createNoteCard(note) {
            const card = document.createElement('div');
            card.className = 'note-card';
            card.innerHTML = `
                <div class="note-card-header">
                    <div class="note-title">${escapeHtml(note.title)}</div>
                    <span class="note-category">${escapeHtml(note.category)}</span>
                </div>
                <div class="note-card-body">
                    <div class="note-description">${escapeHtml(note.description)}</div>
                    <div class="note-price">৳${note.price.toFixed(2)}</div>
                    <div class="note-actions">
                        <button class="action-btn preview-btn" onclick="previewPdf(${note.id}, '${escapeHtml(note.title)}')">
                            👁️ Preview
                        </button>
                        <button class="action-btn download-btn" onclick="downloadPdf(${note.id}, '${escapeHtml(note.title)}')">
                            ⬇️ Download
                        </button>
                        <button class="action-btn edit-btn" onclick='openEditModal(${JSON.stringify(note)})'>
                            ✏️ Edit
                        </button>
                        <button class="action-btn delete-btn" onclick="deleteNote(${note.id})">
                            🗑️ Delete
                        </button>
                    </div>
                </div>
            `;
            return card;
        }

        // Preview PDF
        function previewPdf(noteId, title) {
            const modal = document.getElementById('pdfModal');
            const viewer = document.getElementById('pdfViewer');
            const loading = document.getElementById('pdfLoading');
            
            currentPdfUrl = `/seller/notes/view/${noteId}`;
            modalTitle.textContent = title;
            
            // Show loading
            loading.classList.add('active');
            viewer.style.display = 'none';
            
            // Set iframe src
            viewer.src = currentPdfUrl;
            
            // Handle load event
            viewer.onload = function() {
                loading.classList.remove('active');
                viewer.style.display = 'block';
            };
            
            // Handle error event
            viewer.onerror = function() {
                loading.classList.remove('active');
                loading.textContent = 'Error loading PDF. Click "Open in New Tab" to view.';
                loading.classList.add('active');
            };
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Open in new tab
        function openInNewTab() {
            if (currentPdfUrl) {
                window.open(currentPdfUrl, '_blank');
            }
        }

        // Close preview
        function closePreview() {
            const modal = document.getElementById('pdfModal');
            const viewer = document.getElementById('pdfViewer');
            const loading = document.getElementById('pdfLoading');
            
            modal.classList.remove('active');
            viewer.src = '';
            loading.classList.remove('active');
            loading.textContent = 'Loading PDF...';
            viewer.style.display = 'block';
            currentPdfUrl = '';
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('pdfModal');
            if (event.target === modal) {
                closePreview();
            }
        }

        // Escape key to close modal
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const modal = document.getElementById('pdfModal');
                if (modal.classList.contains('active')) {
                    closePreview();
                }
            }
        });

        // Download PDF
        function downloadPdf(noteId, title) {
            const link = document.createElement('a');
            link.href = `/seller/notes/download/${noteId}`;
            link.download = title + '.pdf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showMessage('Download started...', 'success');
        }

        // Delete note
        async function deleteNote(noteId) {
            if (!confirm('Are you sure you want to delete this note? This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch(`/seller/notes/${noteId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showMessage('Note deleted successfully!', 'success');
                    loadNotes();
                } else {
                    const error = await response.text();
                    showMessage('Error: ' + error, 'error');
                }
            } catch (error) {
                showMessage('Error deleting note: ' + error.message, 'error');
            }
        }

        // Open edit modal
        function openEditModal(note) {
            document.getElementById('editNoteId').value = note.id;
            document.getElementById('editTitle').value = note.title;
            document.getElementById('editDescription').value = note.description;
            document.getElementById('editCategory').value = note.category;
            document.getElementById('editPrice').value = note.price;
            
            document.getElementById('editModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close edit modal
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editForm').reset();
            document.body.style.overflow = 'auto';
        }

        // Update note
        async function updateNote(event) {
            event.preventDefault();
            
            const noteId = document.getElementById('editNoteId').value;
            const updateData = {
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDescription').value,
                category: document.getElementById('editCategory').value,
                price: parseFloat(document.getElementById('editPrice').value)
            };
            
            try {
                const response = await fetch(`/seller/notes/${noteId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updateData)
                });
                
                if (response.ok) {
                    showMessage('Note updated successfully!', 'success');
                    closeEditModal();
                    loadNotes();
                } else {
                    const error = await response.text();
                    showMessage('Error: ' + error, 'error');
                }
            } catch (error) {
                showMessage('Error updating note: ' + error.message, 'error');
            }
        }

        // Close edit modal when clicking outside
        window.addEventListener('click', function(event) {
            const editModal = document.getElementById('editModal');
            if (event.target === editModal) {
                closeEditModal();
            }
        });

        // Show message
        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            container.innerHTML = '';
            container.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
