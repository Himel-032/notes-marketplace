<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .username {
            color: #764ba2;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .role-badge {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }
        .info h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .info ul {
            list-style: none;
            padding-left: 0;
        }
        .info li {
            padding: 8px 0;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
        }
        .info li:last-child {
            border-bottom: none;
        }
        .logout-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📝</div>
        <h1>Welcome Seller!</h1>
        <div class="username" sec:authentication="name"></div>
        <span class="role-badge">SELLER</span>
        
        <div class="info">
            <h3>💼 Seller Features</h3>
            <ul>
                <li>✅ Upload your notes for sale</li>
                <li>✅ Manage your notes inventory</li>
                <li>✅ View your sales statistics</li>
                <li>✅ Set pricing for your notes</li>
                <li>✅ Track earnings and payouts</li>
            </ul>
        </div>
        
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</body>
</html>
