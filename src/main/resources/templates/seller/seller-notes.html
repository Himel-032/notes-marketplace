<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes - Seller Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .note-card { transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .note-card:hover { transform: translateY(-5px); box-shadow: 0 16px 28px rgba(15, 23, 42, 0.14); }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            width: min(1100px, 95vw);
            height: 90%;
            border-radius: 1rem;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            background: #1d4ed8;
            color: white;
            padding: 16px;
            border-radius: 1rem 1rem 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .open-new-tab-btn {
            background: white;
            color: #1d4ed8;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        .open-new-tab-btn:hover { opacity: 0.85; }
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-body {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #525659;
        }
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        .pdf-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            display: none;
        }
        .pdf-loading.active { display: block; }

        .edit-modal-content {
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 1rem;
            position: relative;
        }
        .edit-form { padding: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .submit-btn,
        .cancel-btn {
            border: none;
            border-radius: 5px;
            font-weight: 600;
            padding: 12px 30px;
            cursor: pointer;
        }
        .submit-btn { background: #1d4ed8; color: white; }
        .cancel-btn { background: #95a5a6; color: white; }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        @media (max-width: 768px) {
            .modal-content {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar('seller-notes')}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header('My Uploaded Notes')}"></div>

<main class="admin-content container-fluid">
    <section class="card admin-panel mb-3">
        <div class="card-body d-flex flex-column flex-lg-row justify-content-between gap-2">
            <div>
                <h1 class="h4 mb-1">My Uploaded Notes</h1>
                <p class="text-secondary mb-0">Manage your uploaded content, prices, and actions.</p>
            </div>
            <div class="d-flex gap-2">
                <a href="/seller/dashboard" class="btn btn-outline-secondary">Dashboard</a>
                <a href="/seller/upload-note" class="btn btn-primary">Upload New Note</a>
            </div>
        </div>
    </section>

    <section class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 mb-0">Notes</h2>
        <span class="badge text-bg-primary" id="notesCount">Loading...</span>
    </section>

    <div id="messageContainer"></div>
    <div class="alert alert-info" id="loading">Loading your notes...</div>
    <div id="notesContainer" class="row g-3"></div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<div id="pdfModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">PDF Preview</div>
            <div class="modal-actions">
                <button class="open-new-tab-btn" onclick="openInNewTab()">Open in New Tab</button>
                <button class="close-modal" onclick="closePreview()">&times;</button>
            </div>
        </div>
        <div class="modal-body">
            <div class="pdf-loading" id="pdfLoading">Loading PDF...</div>
            <iframe id="pdfViewer" class="pdf-viewer" frameborder="0"></iframe>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="edit-modal-content">
        <div class="modal-header">
            <div class="modal-title">Edit Note</div>
            <button class="close-modal" onclick="closeEditModal()">&times;</button>
        </div>
        <form class="edit-form" id="editForm" onsubmit="updateNote(event)">
            <input type="hidden" id="editNoteId">

            <div class="form-group">
                <label for="editTitle">Title *</label>
                <input type="text" id="editTitle" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="editDescription">Description *</label>
                <textarea id="editDescription" class="form-control" required></textarea>
            </div>

            <div class="form-group">
                <label for="editCategory">Category *</label>
                <input type="text" id="editCategory" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="editPrice">Price (৳) *</label>
                <input type="number" id="editPrice" class="form-control" min="0" step="0.01" required>
            </div>

            <div class="form-actions">
                <button type="button" class="cancel-btn" onclick="closeEditModal()">Cancel</button>
                <button type="submit" class="submit-btn">Update Note</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
<script>
    let allNotes = [];
    let currentPdfUrl = '';

    document.addEventListener('DOMContentLoaded', function() {
        loadNotes();
    });

    async function loadNotes() {
        const loading = document.getElementById('loading');
        const container = document.getElementById('notesContainer');
        const countDiv = document.getElementById('notesCount');

        loading.style.display = 'block';
        container.innerHTML = '';

        try {
            const response = await fetch('/seller/notes/my-notes');

            if (response.ok) {
                allNotes = await response.json();
                countDiv.textContent = `Total: ${allNotes.length} note${allNotes.length !== 1 ? 's' : ''}`;

                if (allNotes.length === 0) {
                    container.innerHTML = `
                        <div class="col-12">
                            <div class="card admin-panel">
                                <div class="card-body text-center py-5">
                                    <h3 class="h5">No Notes Uploaded Yet</h3>
                                    <p class="text-secondary">Start sharing your knowledge by uploading your first note.</p>
                                    <a href="/seller/upload-note" class="btn btn-primary">Upload Your First Note</a>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    allNotes.forEach(note => {
                        container.appendChild(createNoteCard(note));
                    });
                }
            } else {
                showMessage('Error loading notes', 'error');
            }
        } catch (error) {
            showMessage('Error: ' + error.message, 'error');
        } finally {
            loading.style.display = 'none';
        }
    }

    function createNoteCard(note) {
        const card = document.createElement('div');
        card.className = 'col-12 col-md-6 col-xl-4';
        card.innerHTML = `
            <article class="card admin-panel note-card h-100">
                <div class="card-body d-flex flex-column">
                    <h3 class="h5 mb-1">${escapeHtml(note.title)}</h3>
                    <span class="badge text-bg-primary align-self-start mb-2">${escapeHtml(note.category)}</span>
                    <p class="text-secondary small mb-3">${escapeHtml(note.description)}</p>
                    <p class="h5 text-success mb-3">৳ ${note.price.toFixed(2)}</p>
                    <div class="d-grid gap-2 mt-auto">
                        <button class="btn btn-outline-primary btn-sm" onclick="previewPdf(${note.id}, '${escapeHtml(note.title)}')">Preview</button>
                        <button class="btn btn-success btn-sm" onclick="downloadPdf(${note.id}, '${escapeHtml(note.title)}')">Download</button>
                        <button class="btn btn-secondary btn-sm" onclick='openEditModal(${JSON.stringify(note)})'>Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteNote(${note.id})">Delete</button>
                    </div>
                </div>
            </article>
        `;
        return card;
    }

    function previewPdf(noteId, title) {
        const modal = document.getElementById('pdfModal');
        const viewer = document.getElementById('pdfViewer');
        const loading = document.getElementById('pdfLoading');

        currentPdfUrl = `/seller/notes/view/${noteId}`;
        modalTitle.textContent = title;

        loading.classList.add('active');
        viewer.style.display = 'none';
        viewer.src = currentPdfUrl;

        viewer.onload = function() {
            loading.classList.remove('active');
            viewer.style.display = 'block';
        };

        viewer.onerror = function() {
            loading.classList.remove('active');
            loading.textContent = 'Error loading PDF. Click "Open in New Tab" to view.';
            loading.classList.add('active');
        };

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function openInNewTab() {
        if (currentPdfUrl) {
            window.open(currentPdfUrl, '_blank');
        }
    }

    function closePreview() {
        const modal = document.getElementById('pdfModal');
        const viewer = document.getElementById('pdfViewer');
        const loading = document.getElementById('pdfLoading');

        modal.classList.remove('active');
        viewer.src = '';
        loading.classList.remove('active');
        loading.textContent = 'Loading PDF...';
        viewer.style.display = 'block';
        currentPdfUrl = '';
        document.body.style.overflow = 'auto';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('pdfModal');
        if (event.target === modal) {
            closePreview();
        }
    };

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            const modal = document.getElementById('pdfModal');
            if (modal.classList.contains('active')) {
                closePreview();
            }
        }
    });

    function downloadPdf(noteId, title) {
        const link = document.createElement('a');
        link.href = `/seller/notes/download/${noteId}`;
        link.download = title + '.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showMessage('Download started...', 'success');
    }

    async function deleteNote(noteId) {
        if (!confirm('Are you sure you want to delete this note? This action cannot be undone.')) {
            return;
        }

        try {
            const response = await fetch(`/seller/notes/${noteId}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                showMessage('Note deleted successfully!', 'success');
                loadNotes();
            } else {
                const error = await response.text();
                showMessage('Error: ' + error, 'error');
            }
        } catch (error) {
            showMessage('Error deleting note: ' + error.message, 'error');
        }
    }

    function openEditModal(note) {
        document.getElementById('editNoteId').value = note.id;
        document.getElementById('editTitle').value = note.title;
        document.getElementById('editDescription').value = note.description;
        document.getElementById('editCategory').value = note.category;
        document.getElementById('editPrice').value = note.price;

        document.getElementById('editModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
        document.getElementById('editForm').reset();
        document.body.style.overflow = 'auto';
    }

    async function updateNote(event) {
        event.preventDefault();

        const noteId = document.getElementById('editNoteId').value;
        const updateData = {
            title: document.getElementById('editTitle').value,
            description: document.getElementById('editDescription').value,
            category: document.getElementById('editCategory').value,
            price: parseFloat(document.getElementById('editPrice').value)
        };

        try {
            const response = await fetch(`/seller/notes/${noteId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updateData)
            });

            if (response.ok) {
                showMessage('Note updated successfully!', 'success');
                closeEditModal();
                loadNotes();
            } else {
                const error = await response.text();
                showMessage('Error: ' + error, 'error');
            }
        } catch (error) {
            showMessage('Error updating note: ' + error.message, 'error');
        }
    }

    window.addEventListener('click', function(event) {
        const editModal = document.getElementById('editModal');
        if (event.target === editModal) {
            closeEditModal();
        }
    });

    function showMessage(message, type) {
        const container = document.getElementById('messageContainer');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.textContent = message;
        container.innerHTML = '';
        container.appendChild(messageDiv);

        setTimeout(() => {
            messageDiv.remove();
        }, 5000);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
