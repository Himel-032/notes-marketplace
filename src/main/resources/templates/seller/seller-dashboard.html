<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Notes Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: white;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-left h1 {
            color: #667eea;
            font-size: 28px;
        }
        .logout-btn {
            padding: 10px 25px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* User Info Card */
        .user-info-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }
        .user-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .username {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .user-email {
            color: #666;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .role-badge {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 16px;
        }
        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #666;
            font-size: 16px;
            font-weight: 600;
        }
        /* Quick Actions */
        .quick-actions {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .quick-actions h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .action-btn {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 18px;
            text-align: center;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .action-btn:hover {
            transform: translateY(-3px);
        }
        .action-btn.add-new {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }
        /* Recent Notes Section */
        .recent-notes {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .recent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .recent-header h2 {
            color: #667eea;
            font-size: 24px;
        }
        .view-all-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .view-all-link:hover {
            text-decoration: underline;
        }
        .notes-list {
            display: grid;
            gap: 15px;
        }
        .note-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .note-info {
            flex: 1;
        }
        .note-title {
            color: #333;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .note-category {
            display: inline-block;
            background: #764ba2;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 10px;
        }
        .note-price {
            color: #27ae60;
            font-size: 20px;
            font-weight: 700;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .no-notes {
            text-align: center;
            color: #999;
            padding: 40px;
        }
        .no-notes-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>📊 Seller Dashboard</h1>
        </div>
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- User Info Card -->
        <div class="user-info-card">
            <div class="user-icon">👤</div>
            <div class="username" sec:authentication="name">User</div>
            <div class="user-email" sec:authentication="name"></div>
            <span class="role-badge">✅ SELLER ACCOUNT</span>
        </div>

        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-number" id="totalNotes">0</div>
                <div class="stat-label">Total Notes</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-number" id="totalEarnings">$0</div>
                <div class="stat-label">Total Value</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📂</div>
                <div class="stat-number" id="totalCategories">0</div>
                <div class="stat-label">Categories</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <h2>⚡ Quick Actions</h2>
            <div class="action-buttons">
                <a href="/seller/upload-note" class="action-btn add-new">
                    ➕ Upload New Note
                </a>
                <a href="/seller/notes" class="action-btn">
                    📚 View All Notes
                </a>
            </div>
        </div>

        <!-- Recent Notes -->
        <div class="recent-notes">
            <div class="recent-header">
                <h2>📝 Recent Notes</h2>
                <a href="/seller/notes" class="view-all-link">View All →</a>
            </div>
            <div class="loading" id="loading">Loading your notes...</div>
            <div id="notesContainer" class="notes-list"></div>
        </div>
    </div>

    <script>
        // Load dashboard data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboardData();
        });

        // Load dashboard data
        async function loadDashboardData() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('notesContainer');
            
            try {
                const response = await fetch('/seller/notes/my-notes');
                
                if (response.ok) {
                    const notes = await response.json();
                    
                    // Update statistics
                    updateStatistics(notes);
                    
                    // Show recent notes (last 5)
                    if (notes.length === 0) {
                        container.innerHTML = `
                            <div class="no-notes">
                                <div class="no-notes-icon">📭</div>
                                <p>No notes uploaded yet. Start by uploading your first note!</p>
                            </div>
                        `;
                    } else {
                        const recentNotes = notes.slice(0, 5);
                        container.innerHTML = '';
                        recentNotes.forEach(note => {
                            container.appendChild(createNoteItem(note));
                        });
                    }
                } else {
                    container.innerHTML = '<div class="no-notes">❌ Error loading notes</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="no-notes">❌ Error: ' + error.message + '</div>';
            } finally {
                loading.style.display = 'none';
            }
        }

        // Update statistics
        function updateStatistics(notes) {
            // Total notes
            document.getElementById('totalNotes').textContent = notes.length;
            
            // Total earnings (sum of all note prices)
            const totalValue = notes.reduce((sum, note) => sum + (note.price || 0), 0);
            document.getElementById('totalEarnings').textContent = '৳' + totalValue.toFixed(2);
            
            // Unique categories
            const categories = new Set(notes.map(note => note.category));
            document.getElementById('totalCategories').textContent = categories.size;
        }

        // Create note item element
        function createNoteItem(note) {
            const item = document.createElement('div');
            item.className = 'note-item';
            item.innerHTML = `
                <div class="note-info">
                    <div class="note-title">${escapeHtml(note.title)}</div>
                    <span class="note-category">${escapeHtml(note.category)}</span>
                </div>
                <div class="note-price">৳${note.price.toFixed(2)}</div>
            `;
            return item;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
