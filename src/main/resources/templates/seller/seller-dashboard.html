<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Notes Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar('seller-dashboard')}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header('Seller Dashboard')}"></div>

    <main class="admin-content container-fluid">
        <section class="card admin-panel mb-3">
            <div class="card-body d-flex flex-column flex-lg-row justify-content-between gap-3">
                <div>
                    <p class="text-secondary mb-1">Seller Workspace</p>
                    <h1 class="h4 mb-1">Manage and publish your notes</h1>
                    <p class="mb-0 text-secondary">Signed in as <strong sec:authentication="name">seller@example.com</strong></p>
                </div>
                <div class="d-flex gap-2 align-items-start">
                    <a href="/seller/upload-note" class="btn btn-primary">Upload Note</a>
                    <a href="/seller/notes" class="btn btn-outline-secondary">My Notes</a>
                </div>
            </div>
        </section>

        <section class="row g-3 mb-3">
            <div class="col-12 col-md-4">
                <div class="card admin-panel h-100">
                    <div class="card-body text-center">
                        <p class="text-secondary mb-1">Total Notes</p>
                        <p class="display-6 mb-0" id="totalNotes">0</p>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card admin-panel h-100">
                    <div class="card-body text-center">
                        <p class="text-secondary mb-1">Total Value</p>
                        <p class="display-6 mb-0 text-success" id="totalEarnings">৳ 0</p>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card admin-panel h-100">
                    <div class="card-body text-center">
                        <p class="text-secondary mb-1">Categories</p>
                        <p class="display-6 mb-0" id="totalCategories">0</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="card admin-panel">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h2 class="h5 mb-0">Recent Notes</h2>
                    <a href="/seller/notes" class="btn btn-sm btn-outline-primary">View All</a>
                </div>
                <div class="alert alert-info" id="loading">Loading your notes...</div>
                <div id="notesContainer" class="vstack gap-2"></div>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

    <script>
        // Load dashboard data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboardData();
        });

        // Load dashboard data
        async function loadDashboardData() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('notesContainer');
            
            try {
                const response = await fetch('/seller/notes/my-notes');
                
                if (response.ok) {
                    const notes = await response.json();
                    
                    // Update statistics
                    updateStatistics(notes);
                    
                    // Show recent notes (last 5)
                    if (notes.length === 0) {
                        container.innerHTML = `
                            <div class="no-notes">
                                <div class="no-notes-icon">📭</div>
                                <p>No notes uploaded yet. Start by uploading your first note!</p>
                            </div>
                        `;
                    } else {
                        const recentNotes = notes.slice(0, 5);
                        container.innerHTML = '';
                        recentNotes.forEach(note => {
                            container.appendChild(createNoteItem(note));
                        });
                    }
                } else {
                    container.innerHTML = '<div class="no-notes">❌ Error loading notes</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="no-notes">❌ Error: ' + error.message + '</div>';
            } finally {
                loading.style.display = 'none';
            }
        }

        // Update statistics
        function updateStatistics(notes) {
            // Total notes
            document.getElementById('totalNotes').textContent = notes.length;
            
            // Total earnings (sum of all note prices)
            const totalValue = notes.reduce((sum, note) => sum + (note.price || 0), 0);
            document.getElementById('totalEarnings').textContent = '৳' + totalValue.toFixed(2);
            
            // Unique categories
            const categories = new Set(notes.map(note => note.category));
            document.getElementById('totalCategories').textContent = categories.size;
        }

        // Create note item element
        function createNoteItem(note) {
            const item = document.createElement('div');
            item.className = 'd-flex flex-column flex-md-row justify-content-between align-items-md-center border rounded p-3';
            item.innerHTML = `
                <div class="note-info">
                    <div class="fw-semibold">${escapeHtml(note.title)}</div>
                    <span class="badge text-bg-primary mt-1">${escapeHtml(note.category)}</span>
                </div>
                <div class="h5 text-success mt-2 mt-md-0 mb-0">৳ ${note.price.toFixed(2)}</div>
            `;
            return item;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
