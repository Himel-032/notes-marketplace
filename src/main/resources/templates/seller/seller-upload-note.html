<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Note - Seller Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: white;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-left h1 {
            color: #667eea;
            font-size: 28px;
        }
        .nav-links {
            display: flex;
            gap: 15px;
        }
        .nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }
        .nav-btn:hover {
            background: #5568d3;
        }
        .nav-btn.secondary {
            background: #764ba2;
        }
        .nav-btn.secondary:hover {
            background: #5f3a82;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        h2 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 32px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 16px;
        }
        .required {
            color: #e74c3c;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        .file-input-label {
            display: block;
            padding: 12px;
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
        }
        .file-input-label:hover {
            background: #e9ecef;
        }
        .file-name {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
            text-align: center;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background: #5568d3;
        }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .help-text {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        .form-footer {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .cancel-btn {
            flex: 1;
            padding: 15px;
            background: #e0e0e0;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            font-size: 18px;
            text-align: center;
            transition: background 0.3s;
        }
        .cancel-btn:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>📤 Upload Note</h1>
        </div>
        <div class="nav-links">
            <a href="/seller/dashboard" class="nav-btn">Dashboard</a>
            <a href="/seller/notes" class="nav-btn secondary">My Notes</a>
        </div>
    </div>

    <!-- Upload Form -->
    <div class="container">
        <h2>📝 Add New Note</h2>
        <div id="uploadMessage"></div>
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">Note Title <span class="required">*</span></label>
                <input type="text" id="title" name="title" required placeholder="e.g., Advanced Data Structures - Complete Notes">
                <div class="help-text">Choose a descriptive title for your notes</div>
            </div>
            
            <div class="form-group">
                <label for="description">Description <span class="required">*</span></label>
                <textarea id="description" name="description" required placeholder="Provide a detailed description of what this note covers..."></textarea>
                <div class="help-text">Explain what topics are covered, level of detail, and who would benefit from these notes</div>
            </div>
            
            <div class="form-group">
                <label for="category">Category <span class="required">*</span></label>
                <select id="category" name="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Business">Business</option>
                    <option value="Economics">Economics</option>
                    <option value="Literature">Literature</option>
                    <option value="History">History</option>
                    <option value="Psychology">Psychology</option>
                    <option value="Medicine">Medicine</option>
                    <option value="Law">Law</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="price">Price (BDT) <span class="required">*</span></label>
                <input type="number" id="price" name="price" min="0" step="0.01" required placeholder="0.00">
                <div class="help-text">Set a fair price for your notes (minimum TK0.00)</div>
            </div>
            
            <div class="form-group">
                <label>PDF File <span class="required">*</span></label>
                <div class="file-input-wrapper">
                    <label for="file" class="file-input-label">
                        📎 Click to select PDF file
                    </label>
                    <input type="file" id="file" name="file" accept=".pdf" required>
                </div>
                <div class="file-name" id="fileName">No file selected</div>
                <div class="help-text">Only PDF files are accepted (Max size: 10MB)</div>
            </div>
            
            <div class="form-footer">
                <a href="/seller/dashboard" class="cancel-btn">Cancel</a>
                <button type="submit" class="submit-btn" id="submitBtn">Upload Note</button>
            </div>
        </form>
    </div>

    <script>
        // File input handler
        document.getElementById('file').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || 'No file selected';
            document.getElementById('fileName').textContent = fileName;
        });

        // Form submission handler
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('uploadMessage');
            const formData = new FormData(this);
            
            // Validate file
            const fileInput = document.getElementById('file');
            if (fileInput.files.length === 0) {
                showMessage('Please select a PDF file', 'error');
                return;
            }
            
            const file = fileInput.files[0];
            if (!file.type.includes('pdf')) {
                showMessage('Only PDF files are allowed', 'error');
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                showMessage('File size must be less than 10MB', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading... Please wait';
            messageDiv.innerHTML = '';
            
            try {
                const response = await fetch('/seller/notes/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const note = await response.json();
                    showMessage('Note uploaded successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/seller/notes';
                    }, 2000);
                } else {
                    const error = await response.text();
                    showMessage('Error: ' + error, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Upload Note';
                }
            } catch (error) {
                showMessage('Error uploading note: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload Note';
            }
        });

        // Show message function
        function showMessage(message, type) {
            const container = document.getElementById('uploadMessage');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            container.innerHTML = '';
            container.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }
    </script>
</body>
</html>
