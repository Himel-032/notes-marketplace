<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Note - Seller Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .message { padding: 0.85rem; border-radius: 0.75rem; margin-bottom: 1rem; }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments/sidebar :: sidebar('seller-upload')}"></div>

    <div class="admin-content-wrap">
        <div th:replace="~{fragments/header :: header('Upload New Note')}"></div>

    <main class="admin-content container-fluid">
        <section class="card admin-panel">
            <div class="card-body p-4 p-lg-5">
                <div class="d-flex flex-column flex-lg-row justify-content-between gap-2 mb-3">
                    <div>
                        <h1 class="h4 mb-1">Upload New Note</h1>
                        <p class="text-secondary mb-0">Provide complete details before publishing.</p>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="/seller/dashboard" class="btn btn-outline-secondary">Dashboard</a>
                        <a href="/seller/notes" class="btn btn-outline-primary">My Notes</a>
                    </div>
                </div>

                <div id="uploadMessage"></div>
                <form id="uploadForm" enctype="multipart/form-data" class="row g-3">
                    <div class="col-12">
                        <label for="title" class="form-label">Note Title *</label>
                        <input type="text" id="title" name="title" class="form-control" required placeholder="Advanced Data Structures - Complete Notes">
                    </div>

                    <div class="col-12">
                        <label for="description" class="form-label">Description *</label>
                        <textarea id="description" name="description" class="form-control" rows="5" required placeholder="Describe what this note covers"></textarea>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="category" class="form-label">Category *</label>
                        <select id="category" name="category" class="form-select" required>
                    <option value="">-- Select Category --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Business">Business</option>
                    <option value="Economics">Economics</option>
                    <option value="Literature">Literature</option>
                    <option value="History">History</option>
                    <option value="Psychology">Psychology</option>
                    <option value="Medicine">Medicine</option>
                    <option value="Law">Law</option>
                    <option value="Other">Other</option>
                </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="price" class="form-label">Price (৳) *</label>
                        <input type="number" id="price" name="price" class="form-control" min="0" step="0.01" required placeholder="0.00">
                    </div>

                    <div class="col-12">
                        <label for="file" class="form-label">PDF File *</label>
                        <input type="file" id="file" name="file" class="form-control" accept=".pdf" required>
                        <div class="form-text" id="fileName">No file selected</div>
                    </div>

                    <div class="col-12 d-flex gap-2 pt-2">
                        <a href="/seller/dashboard" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary" id="submitBtn">Upload Note</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

    <script>
        document.getElementById('file').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || 'No file selected';
            document.getElementById('fileName').textContent = fileName;
        });

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('uploadMessage');
            const formData = new FormData(this);

            const fileInput = document.getElementById('file');
            if (fileInput.files.length === 0) {
                showMessage('Please select a PDF file', 'error');
                return;
            }

            const file = fileInput.files[0];
            if (!file.type.includes('pdf')) {
                showMessage('Only PDF files are allowed', 'error');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showMessage('File size must be less than 10MB', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading... Please wait';
            messageDiv.innerHTML = '';

            try {
                const response = await fetch('/seller/notes/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    await response.json();
                    showMessage('Note uploaded successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/seller/notes';
                    }, 2000);
                } else {
                    const error = await response.text();
                    showMessage('Error: ' + error, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Upload Note';
                }
            } catch (error) {
                showMessage('Error uploading note: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload Note';
            }
        });

        function showMessage(message, type) {
            const container = document.getElementById('uploadMessage');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            container.innerHTML = '';
            container.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }
    </script>
</body>
</html>
